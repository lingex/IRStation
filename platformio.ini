[platformio]
default_envs = esp32c3

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 4MB
board_upload.maximum_size = 3145728
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/3.3.8/esp32-core-3.3.8.tar.xz
  framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.3.8/esp32-core-3.3.8-libs.tar.xz
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D DEFAULT_AC_PROTOCOL=\"KELVINATOR\"
  -D DEFAULT_AC_MODEL=1
lib_deps =
  olikraus/U8g2@^2.36.12
  crankyoldgit/IRremoteESP8266@^2.8.6
  bblanchon/ArduinoJson@^7.4.2
  mathertel/OneButton@^2.6.1
